[project]
name = "aioetcd3"
version = "0.0.1"
description = "Asynchronous etcd3 library"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "grpcio>=1.78.1",
    "protobuf>=6.33.5",
]

[dependency-groups]
dev = [
    "ruff",
    "pytest",
    "pytest-cov",
    "pyright",
    "pyinstaller",
    "grpcio-tools>=1.78.1",
    "pytest-asyncio>=1.3.0",
]

[project.scripts]
#aioetcd3 = ""

[build-system]
requires = ["setuptools>=69.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py313"
line-length = 100
src = ["src", "tests"]
exclude = ["build", "dist", "__pycache__", "*.egg-info", ".venv", "src/aioetcd3/proto"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "PL", "PT"]

[tool.ruff.lint.per-file-ignores]
"tests/*.py" = ["PLR2004"]

[tool.ruff.format]
quote-style = "single"

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "basic"
include = ["src", "tests"]
extraPaths = ["src"]
exclude = ["build", "dist", "**/__pycache__", "**/*.egg-info", ".venv", "src/aioetcd3/proto"]
venvPath = "."
venv = ".venv"
reportMissingImports = "none"
reportMissingModuleSource = "none"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=src --cov-report=xml --cov-report=term --cov-report=html -v"

[tool.coverage.run]
omit = [
    "src/aioetcd3/proto/*",
]
